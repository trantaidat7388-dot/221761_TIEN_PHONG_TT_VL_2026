name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  python-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest ruff httpx

      - name: Lint (Python)
        run: |
          ruff check backend/app backend/core_engine tests --select E9,F

  python-tests-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: python-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest ruff httpx pytest-timeout

      - name: Run fast selected tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_api_smoke.py tests/test_regression_template_zip.py --timeout=120 --timeout-method=thread --maxfail=1

  python-test-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: python-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest ruff httpx pytest-timeout

      - name: Run compile test with timeout guard
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/test_compile.py --timeout=180
